{% extends "base.html" %}

{% block title %}ทำนาย{% endblock title %}

{% block style %}
<style>
    /* ทำไฟกะพริบให้ปุ่ม LIVE ดูสมจริง */
    .animate-pulse {
        animation: pulse-red 2s infinite;
    }

    @keyframes pulse-red {
        0% {
            opacity: 1;
        }

        50% {
            opacity: 0.5;
        }

        100% {
            opacity: 1;
        }
    }

    #offlineOverlay {
        /* เปลี่ยนจากพื้นหลังทึบ เป็นใส่เส้นขอบสีแดงหนาๆ รอบจอ */
        background: rgba(255, 0, 0, 0.1);
        /* สีแดงจางๆ ทั่วจอ */
        border: 5px solid #dc3545;
        box-shadow: inset 0 0 50px rgba(220, 53, 69, 0.5);
        /* เงาสีแดงด้านใน */
        z-index: 20;
        pointer-events: none;
        /* เพื่อให้ยังกดปุ่มใน iframe ได้ถ้าจำเป็น */
    }

    .signal-lost-text {
        background: rgba(0, 0, 0, 0.2);
        /* พื้นหลังดำเฉพาะตรงข้อความ */
        padding: 2rem;
        border-radius: 1rem;
        pointer-events: auto;
        /* ให้ปุ่มกดได้ */
    }

    /* เพิ่ม Animation ให้ขอบจอกระพริบ */
    .border-pulse {
        animation: border-danger-pulse 2s infinite;
    }

    @keyframes border-danger-pulse {
        0% {
            border-color: #dc3545;
            box-shadow: inset 0 0 20px rgba(220, 53, 69, 0.3);
        }

        50% {
            border-color: #ffc107;
            box-shadow: inset 0 0 50px rgba(255, 193, 7, 0.5);
        }

        100% {
            border-color: #dc3545;
            box-shadow: inset 0 0 20px rgba(220, 53, 69, 0.3);
        }
    }

    .pointer-events-none {
        pointer-events: none;
    }

    .crosshair-container {
        position: relative;
        width: 60px;
        /* ปรับขนาดความกว้างเป้า */
        height: 60px;
        /* ปรับขนาดความสูงเป้า */
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* เส้นแนวตั้ง */
    .crosshair-vertical {
        position: absolute;
        width: 2px;
        height: 100%;
        background-color: rgba(0, 255, 0, 0.7);
        /* สีเขียวโปร่งแสงแบบ Night Vision */
    }

    /* เส้นแนวนอน */
    .crosshair-horizontal {
        position: absolute;
        width: 100%;
        height: 2px;
        background-color: rgba(0, 255, 0, 0.7);
    }

    /* จุดไข่ปลาตรงกลาง */
    .crosshair-center {
        width: 4px;
        height: 4px;
        background-color: #00ff00;
        border-radius: 50%;
        z-index: 2;
        box-shadow: 0 0 5px rgba(0, 255, 0, 1);
    }

    /* เพิ่มกิมมิค วงกลมล้อมรอบ (ถ้าชอบ) */
    .crosshair-container::after {
        content: '';
        position: absolute;
        width: 40px;
        height: 40px;
        border: 1px solid rgba(0, 255, 0, 0.4);
        border-radius: 50%;
    }

    .progress-bar-animated {
        /* ทำให้ลายทางวิ่งเร็วขึ้น */
        transition: width 0.6s ease;
        animation: progress-bar-stripes 0.5s linear infinite !important;
    }

    /* เพิ่ม Effect กะพริบเมื่อมีการประมวลผล */
    .is-processing {
        animation: pulse-animation 1.5s infinite;
    }

    @keyframes pulse-animation {
        0% {
            opacity: 1;
        }

        50% {
            opacity: 0.7;
        }

        100% {
            opacity: 1;
        }
    }
</style>
{% endblock style %}

{% block content %}
<div class="container-fluid py-2">
    <div class="progress" style="height: 25px;">
        <div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%">
        </div>
    </div>
</div>

<div class="container-fluid flex-grow-1 mt-3">
    <div class="row h-100 g-0">
        <div class="col-md-8">
            <div class="d-flex flex-column" style="height: calc(100vh - 150px); min-height: 400px;">
                <div class="flex-grow-1 bg-black position-relative">
                    <img src="data:image/png;base64,{{data.detected_image}}" class="w-100 h-100"
                        style="object-fit: contain; position: absolute; top: 0; left: 0;">

                    <div class="position-absolute top-50 start-50 translate-middle pointer-events-none"
                        style="z-index: 25;">
                        <div class="crosshair-container">
                            <div class="crosshair-vertical"></div>
                            <div class="crosshair-horizontal"></div>
                            <div class="crosshair-center"></div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
        <div class="col-md-4 bg-light py-3 justify-content-center p-3">
            <h3 class="mb-4 text-center">ตรวจสอบข้อมูล</h3>
            <div>
                <!-- forecast -->
                <div class="row mb-3 align-items-center">
                    <div class="col">
                        <label for="forecastName" class="col-form-label text-sm-end">ภารกิจ:</label>
                    </div>
                    <div class="col-sm-9">
                        <input type="text" class="form-control" value="{{forecastName}}" disabled>
                    </div>
                </div>

                <!-- drone -->
                <div class="row mb-3 align-items-center">
                    <div class="col">
                        <label for="droneId" class="col-form-label text-sm-end">โดรน:</label>
                    </div>
                    <div class="col-sm-9">
                        <input type="text" class="form-control" value="{{droneId}}" disabled>
                    </div>
                </div>

                <!-- latitude -->
                <div class="row mb-3 align-items-center">
                    <div class="col">
                        <label for="latitude" class="col-form-label text-sm-end">ละติจูด:</label>
                    </div>
                    <div class="col-sm-9">
                        <input type="number" step="0.00000001" name="latitude" id="latitude" class="form-control"
                            placeholder="18.684905" value="{{latitude}}" disabled>
                    </div>
                </div>

                <!-- longitude -->
                <div class="row mb-3 align-items-center">
                    <div class="col">
                        <label for="longitude" class="col-form-label text-sm-end">ลองจิจูด:</label>
                    </div>
                    <div class="col-sm-9">
                        <input type="number" step="0.00000001" name="longitude" id="longitude" class="form-control"
                            placeholder="100.213579" value="{{longitude}}" disabled>
                    </div>
                </div>

                <!-- wind_speed -->
                <div class="row mb-3 align-items-center">
                    <div class="col">
                        <label for="windSpeed" class="col-form-label text-sm-end">ความเร็วลม (m/s):</label>
                    </div>
                    <div class="col-sm-9">
                        <input type="number" step="0.01" name="windSpeed" id="windSpeed" class="form-control"
                            placeholder="0.00" value="{{windSpeed}}" disabled>
                    </div>
                </div>
                <!-- Wind Direction -->
                <div class="row mb-3 align-items-center">
                    <div class="col">
                        <label for="windDirection" class="col-form-label text-sm-end">ทิศทางลม (°):</label>
                    </div>
                    <div class="col-sm-9">
                        <input type="number" name="windDirection" id="windDirection" class="form-control" min="0"
                            max="359" placeholder="0" value="{{windDirection}}" disabled>
                    </div>
                </div>
                <button class="btn btn-primary w-100" id="startBtn">เริ่มการทำนาย</button>
                <button class="btn btn-primary mt-3" id="viewResultBtn" style="display: none;">ดูผลลัพธ์</button>
            </div>
        </div>
    </div>
</div>
{% endblock content %}

{% block scripts %}
<script src="/public/vendor/axios/axios.min.js"></script>
<script>
    window.inputData = {
        forecastId: "{{forecastId}}",
        forecastName: "{{forecastName}}",
        droneId: "{{droneId}}",
        latitude: Number("{{latitude}}"),
        longitude: Number("{{longitude}}"),
        windSpeed: Number("{{windSpeed}}"),
        windDirection: Number("{{windDirection}}"),
        originalImage: "{{data.original_image}}",
        detectedImage: "{{data.detected_image}}",
        bboxes: `{{data.bboxes}}`,
    };
</script>
<script src="/public/js/forecast/forecast-api.js"></script>
{% endblock scripts %}
