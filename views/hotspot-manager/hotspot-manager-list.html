{% extends "base.html" %}

{% block title %}ตรวจจับหัวไฟ{% endblock title %}

{% block style %}
<link rel="stylesheet" href="/public/vendor/data-tables/css/dataTables.bootstrap5.css">
{% endblock style %}

{% block content %}
<h2>ตรวจจับหัวไฟ</h2>

<div class="mb-3"></div>
<div class="d-flex flex-row gap-3">
    <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#create-modal">
        <i class="bi bi-play-circle-fill"></i> เริ่มตัวตรวจจับหัวไฟใหม่
    </button>
    <form action="/hotspot-manager/delete-all" method="post" onsubmit="return confirm('คุณแน่ใจใช่ไหมว่าจะลบทั้งหมด?')">
        <button type="submit" class="btn btn-outline-danger">
            <i class="bi bi-trash"></i> ลบทั้งหมด
        </button>
    </form>
</div>

<div class="modal fade" id="create-modal" tabindex="-1" aria-labelledby="export-modal-label" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="export-modal-label">เริ่มตรวจจับหัวไฟ</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form id="createForm" action="/hotspot-manager/create" method="post">
                <div class="modal-body">
                    <select class="form-select" name="droneId" required>
                        <option selected disabled value="">เลือกโดรน</option>
                        {% for drone in droneList %}
                        <option value="{{drone.id}}">{{drone.id}}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn btn-primary">เริ่ม</button>
                </div>
            </form>
        </div>
    </div>
</div>

<table class="table table-stripped" id="hotspot-manager-table">
    <thead>
        <tr>
            <th>#</th>
            <th>ชื่อ</th>
            <th>ถูกสร้างเมื่อ</th>
            <th>จะปิดในอีก (วินาที)</th>
            <th>จัดการ</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>
{% endblock content %}

{% block scripts%}
<script src="/public/vendor/data-tables/js/jquery-3.7.1.js"></script>
<script src="/public/vendor/data-tables/js/dataTables.js"></script>
<script src="/public/vendor/data-tables/js/dataTables.bootstrap5.js"></script>
<script src="/public/js/hotspot-manager/hotspot-manager-list.js"></script>
{% endblock scripts%}
